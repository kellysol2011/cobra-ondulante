<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cobra Ondulante | Obra Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Vídeo de fundo (você pode trocar depois) -->
        <video id="bgVideo" autoplay loop muted playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-jungle-with-flowing-water-1263-large.mp4" type="video/mp4">
            Seu navegador não suporta vídeo.
        </video>
        
        <!-- Canvas onde a cobra ondula -->
        <canvas id="snakeCanvas"></canvas>
        
        <div class="info">
            <p>🐍 INCLINE O CELULAR → A COBRA SE MOVE</p>
            <p class="small">O corpo da cobra ondula naturalmente</p>
        </div>
        
        <button id="startBtn" class="start-btn">🎮 TOCAR PARA ATIVAR MOVIMENTO</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
