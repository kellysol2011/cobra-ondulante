<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cobra Indígena | Movimento + Rastejo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1e3b2a 0%, #0a1f12 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .container {
            background: rgba(0,0,0,0.45);
            border-radius: 56px;
            padding: 20px;
            backdrop-filter: blur(8px);
        }

        .canvas-wrapper {
            background: #2b4422;
            border-radius: 48px;
            box-shadow: inset 0 0 0 3px rgba(255,215,100,0.5), 0 20px 30px -8px black;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #d9c38a;
            border-radius: 44px;
            cursor: pointer;
        }

        .info-panel {
            margin-top: 24px;
            background: rgba(25,35,20,0.9);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 18px;
            color: white;
            text-align: center;
            border: 1px solid #ffd966;
        }

        .title {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #FFE0A3, #E09D32);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .status {
            font-size: 0.9rem;
            background: #1f4a2c;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 60px;
            margin: 8px 0;
        }

        .gyro-data {
            font-family: monospace;
            background: #000000aa;
            padding: 8px;
            border-radius: 36px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 6px 0;
            font-size: 0.8rem;
        }

        button {
            background: #e09d32;
            border: none;
            color: #1e2a0a;
            font-weight: bold;
            padding: 12px 26px;
            border-radius: 60px;
            font-size: 1rem;
            margin-top: 12px;
            box-shadow: 0 4px 0 #784e1a;
            cursor: pointer;
            transition: 0.07s linear;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #784e1a;
        }

        .hint {
            font-size: 0.7rem;
            margin-top: 12px;
            opacity: 0.85;
            border-top: 1px solid #ffd96666;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="canvas-wrapper">
        <canvas id="snakeCanvas" width="700" height="500" style="width:100%; max-width:700px; aspect-ratio:700/500"></canvas>
    </div>
    <div class="info-panel">
        <div class="title">🐍 COBRA INDÍGENA</div>
        <div class="status" id="sensorStatus">🌀 AGUARDANDO PERMISSÃO</div>
        <div class="gyro-data" id="gyroValues">
            <span>📳 Inclinação X: --</span>
            <span>📳 Inclinação Y: --</span>
        </div>
        <button id="requestBtn">📱 ATIVAR MOVIMENTO DO CELULAR</button>
        <div class="hint">
            🌿 Seu desenho rasteja sozinho (ondulação contínua) + inclinação do celular move a cobra.<br>
            📁 Coloque sua imagem como <strong>cobra-indigena.png</strong> na mesma pasta.
        </div>
    </div>
</div>

<script>
    (function() {
        // ========= CONFIGURAÇÕES ==========
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 700;
        canvas.height = 500;

        // ----- CAMINHO DA SUA IMAGEM (DESENHO EXISTENTE) -----
        const IMG_PATH = 'cobra-indigena.png';   // ⬅️ ALTERE PARA O NOME DO SEU ARQUIVO

        // Carregar a imagem
        const imagemCobra = new Image();
        let imagemPronta = false;
        let larguraImg = 0, alturaImg = 0;

        imagemCobra.onload = () => {
            imagemPronta = true;
            // Define um tamanho base para a imagem (ajustável)
            larguraImg = 140;   // largura em pixels no canvas
            alturaImg = (imagemCobra.height / imagemCobra.width) * larguraImg;
            console.log(`Imagem carregada: ${larguraImg}x${alturaImg}`);
        };
        imagemCobra.onerror = () => {
            console.error(`❌ Erro: não foi possível carregar a imagem "${IMG_PATH}". Verifique se o arquivo está na mesma pasta.`);
            document.getElementById('sensorStatus').innerHTML = '⚠️ IMAGEM NÃO ENCONTRADA! Coloque o arquivo.';
        };
        imagemCobra.src = IMG_PATH;

        // ----- ANIMAÇÃO DE RASTEJO (ondulação interna) -----
        let tempo = 0;
        const VEL_ONDULACAO = 4.2;      // velocidade do "rastejo"
        const AMPLITUDE_X = 12;          // quanto se move para os lados (px)
        const AMPLITUDE_ROTACAO = 0.12;   // quanto gira (radianos) ~7 graus

        // ----- MOVIMENTO POR GIROSCÓPIO (offset X e Y) -----
        let offsetX_Giro = 0;
        let offsetY_Giro = 0;
        const MAX_MOVE_X = 100;
        const MAX_MOVE_Y = 70;

        // valores do giroscópio
        let gamma = 0, beta = 0;
        let smoothGamma = 0, smoothBeta = 0;
        const SMOOTHING = 0.2;
        let orientationEnabled = false;

        // ----- FUNÇÃO QUE DESENHA A IMAGEM COM RASTEJO E OFFSET DO CELULAR -----
        function desenharCena() {
            if (!ctx) return;
            
            // 1. Fundo decorativo (terra/folhagem)
            ctx.fillStyle = '#d9c38a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Textura de folhas
            ctx.globalAlpha = 0.4;
            for(let i=0;i<80;i++) {
                ctx.fillStyle = '#7e5c2e';
                ctx.beginPath();
                ctx.ellipse(Math.random()*canvas.width, Math.random()*canvas.height, 12, 6, Math.random()*Math.PI, 0, 2*Math.PI);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // 2. Se a imagem ainda não carregou, mostrar aviso
            if (!imagemPronta) {
                ctx.font = "bold 20px 'Segoe UI'";
                ctx.fillStyle = "#4a2e1a";
                ctx.shadowBlur = 0;
                ctx.fillText("🖼️ Aguardando imagem...", canvas.width/2-130, canvas.height/2);
                ctx.fillText(`Arquivo: ${IMG_PATH}`, canvas.width/2-120, canvas.height/2+40);
                return;
            }
            
            // 3. Calcular posição base: centro do canvas + deslocamento do giroscópio
            let baseX = canvas.width/2 + offsetX_Giro;
            let baseY = canvas.height/2 + offsetY_Giro;
            
            // 4. ANIMAÇÃO DE RASTEJO (ondulação senoidal)
            //    A imagem se move suavemente para os lados e sofre rotação,
            //    imitando o movimento de uma cobra rastejante.
            const ondaX = Math.sin(tempo * VEL_ONDULACAO) * AMPLITUDE_X;
            const rotacao = Math.sin(tempo * VEL_ONDULACAO * 1.5) * AMPLITUDE_ROTACAO;
            
            // Posição final da imagem (com o rastejo)
            let imgX = baseX + ondaX - larguraImg/2;
            let imgY = baseY - alturaImg/2;
            
            // Aplicar rotação ao redor do centro da imagem
            ctx.save();
            ctx.translate(baseX + ondaX, baseY);
            ctx.rotate(rotacao);
            ctx.drawImage(imagemCobra, -larguraImg/2, -alturaImg/2, larguraImg, alturaImg);
            ctx.restore();
            
            // 5. Pequenos detalhes: sombras de rastro (opcional)
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#6b4c2c';
            for(let i=0;i<3;i++) {
                ctx.beginPath();
                ctx.ellipse(baseX + ondaX - 15 + i*12, baseY + alturaImg/2 - 5, 8, 4, 0, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Atualizar texto da interface com os offsets
            document.getElementById('gyroValues').innerHTML = 
                `<span>📳 Inclinação X: ${Math.round(gamma)}°</span>
                 <span>📳 Inclinação Y: ${Math.round(beta)}°</span>
                 <span>🐍 Offset: (${Math.round(offsetX_Giro)}px, ${Math.round(offsetY_Giro)}px)</span>`;
        }
        
        // ----- LOOP DE ANIMAÇÃO (rastejo contínuo) -----
        let lastTime = 0;
        function animar(now) {
            if (!lastTime) lastTime = now;
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            if (delta > 0) {
                tempo += delta;
            }
            lastTime = now;
            
            desenharCena();
            requestAnimationFrame(animar);
        }
        
        // ----- GIROSCÓPIO: atualiza offset baseado no movimento do celular -----
        function atualizarOffsetPorOrientacao() {
            if (!orientationEnabled) {
                offsetX_Giro = 0;
                offsetY_Giro = 0;
                return;
            }
            // Limitar valores extremos
            let g = Math.min(55, Math.max(-55, gamma));
            let b = Math.min(50, Math.max(-50, beta));
            smoothGamma = smoothGamma * (1 - SMOOTHING) + g * SMOOTHING;
            smoothBeta = smoothBeta * (1 - SMOOTHING) + b * SMOOTHING;
            
            offsetX_Giro = (smoothGamma / 55) * MAX_MOVE_X;
            offsetY_Giro = (smoothBeta / 45) * MAX_MOVE_Y;
        }
        
        function handleOrientation(event) {
            if (!orientationEnabled) return;
            if (event.gamma !== null) gamma = event.gamma;
            if (event.beta !== null) beta = event.beta;
            atualizarOffsetPorOrientacao();
        }
        
        // ----- PERMISSÃO GIROSCÓPIO (iOS vs Android) -----
        function ativarSensor() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(perm => {
                        if (perm === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            orientationEnabled = true;
                            document.getElementById('sensorStatus').innerHTML = '✅ SENSOR ATIVO | INCLINE O CELULAR';
                            document.getElementById('sensorStatus').style.background = '#2a7a4a';
                        } else {
                            document.getElementById('sensorStatus').innerHTML = '❌ Permissão negada.';
                        }
                    })
                    .catch(err => {
                        document.getElementById('sensorStatus').innerHTML = '⚠️ Erro ao acessar giroscópio';
                    });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                orientationEnabled = true;
                document.getElementById('sensorStatus').innerHTML = '📳 MOVIMENTO ATIVO | INCLINE O CELULAR';
                document.getElementById('sensorStatus').style.background = '#2a7a4a';
            }
        }
        
        // Botão para ativar
        const btn = document.getElementById('requestBtn');
        btn.addEventListener('click', () => {
            if (orientationEnabled) {
                document.getElementById('sensorStatus').innerHTML = '⚡ Já está ativo! Incline o celular.';
                return;
            }
            ativarSensor();
        });
        
        // Verificar suporte
        if (!window.DeviceOrientationEvent) {
            document.getElementById('sensorStatus').innerHTML = '📟 Dispositivo sem suporte a giroscópio.';
            btn.disabled = true;
            btn.style.opacity = 0.5;
        } else if (!(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function')) {
            // Android: ativar automaticamente
            window.addEventListener('deviceorientation', handleOrientation);
            orientationEnabled = true;
            document.getElementById('sensorStatus').innerHTML = '📱 SENSOR ATIVO | INCLINE O CELULAR';
        } else {
            document.getElementById('sensorStatus').innerHTML = '📱 Toque no botão para ativar movimento';
        }
        
        // Iniciar animação
        animar();
        
        // Se a imagem demorar, redesenhar periodicamente
        setInterval(() => {
            if (!imagemPronta) desenharCena();
        }, 100);
    })();
</script>
</body>
</html>
