<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cobra Makuxi | Realidade Aumentada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Câmera ao vivo como fundo -->
        <video id="cameraFeed" autoplay playsinline muted></video>
        
        <!-- Canvas da cobra sobreposta -->
        <canvas id="snakeCanvas"></canvas>
        
        <div class="info">
            <p>🐍 COBRA GRANDE | Realidade Aumentada</p>
            <p class="small">Aponte a câmera para qualquer superfície | Incline o celular</p>
        </div>
        
        <button id="startBtn" class="start-btn">🎥 ATIVAR CÂMERA E MOVIMENTO</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
